<!DOCTYPE html>
<html lang="de">

<head>
    <meta charset="UTF-8">
    <title>Metropolia</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body {
            margin: 0;
            background: #222;
            color: white;
            font-family: Arial;
            text-align: center;
        }
        
        canvas {
            display: block;
            margin: auto;
            background: #111;
            cursor: pointer;
        }
        
        button {
            margin: 3px;
            padding: 6px;
        }
        
        #warning {
            color: yellow;
            font-size: 24px;
            display: none;
        }
        
        #gameOver {
            color: red;
            font-size: 40px;
            display: none;
        }
        
        #ui {
            margin: 10px;
        }
    </style>
</head>

<body>
    <h2>METROPOLIA</h2>
    <div id="ui">
        Gebäude: <span id="current"></span> | Kosten: <span id="cost"></span><br>

        <button onclick="setType(ELEMENT.EMPTY.id)">🧹 Löschen</button>
        <button onclick="setType(ELEMENT.ROAD.id)">Straße</button>
        <button onclick="setType(ELEMENT.RES.id)">Wohnhaus</button>
        <button onclick="setType(ELEMENT.HIGH.id)">Hochhaus</button>
        <button onclick="setType(ELEMENT.COM.id)">Gewerbe</button>
        <button onclick="setType(ELEMENT.IND.id)">Industrie</button>
        <button onclick="setType(ELEMENT.INDPARK.id)">Industriepark</button>
        <button onclick="setType(ELEMENT.PARK.id)">Park</button>
        <button onclick="setType(ELEMENT.POWER.id)">Kraftwerk</button>
        <button onclick="setType(ELEMENT.HOTEL.id)">Hotel</button>
        <button onclick="setType(ELEMENT.FARM.id)">Farm</button>
        <br>
    </div>
    <!-- Display element -->
    <div id="nickname-display"></div>
    <div id="nickname-container"></div>
    <p id="stats"></p>
    <div id="warning">⚠ ACHTUNG! Bevölkerung oder Geld kritisch!<br>Du hast 1 Minute Zeit!</div>
    <div id="gameOver">GAME OVER</div>
    <canvas id="game" width="1000" height="1000"></canvas>
    <!-- Kuzzle Client (verwendet native HTTP API, kein SDK nötig) -->
    <script src="js/kuzzle.js"></script>
    <script src="js/game.js"></script>
    <script src="js/avatar.js"></script>
</body>

</html>
