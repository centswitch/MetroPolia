<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>METROPOLIA 25</title>

<style>
body{
margin:0;
background:#111;
color:white;
font-family:Arial;
text-align:center;
}

canvas{
display:block;
margin:auto;
background:#000;
cursor:pointer;
}

button{
margin:2px;
padding:5px;
}

#stats{
margin:6px;
}
</style>
</head>
<body>

<h2>METROPOLIA</h2>

<div>

<button onclick="setType(TYPE.EMPTY)">Löschen</button>
<button onclick="setType(TYPE.ROAD)">Straße</button>

<button onclick="setType(TYPE.RES1)">Haus 1</button>
<button onclick="setType(TYPE.RES2)">Haus 2</button>
<button onclick="setType(TYPE.RES3)">Haus 3</button>

<button onclick="setType(TYPE.COM1)">Shop</button>
<button onclick="setType(TYPE.COM2)">Mall</button>

<button onclick="setType(TYPE.IND1)">Industrie</button>
<button onclick="setType(TYPE.IND2)">Fabrik</button>

<button onclick="setType(TYPE.PARK1)">Park</button>
<button onclick="setType(TYPE.PARK2)">Großer Park</button>

<button onclick="setType(TYPE.POWER1)">Kraftwerk</button>
<button onclick="setType(TYPE.POWER2)">Großkraftwerk</button>

<button onclick="setType(TYPE.FIRE)">Feuerwehr</button>
<button onclick="setType(TYPE.HOSP)">Krankenhaus</button>
<button onclick="setType(TYPE.SCHOOL)">Schule</button>
<button onclick="setType(TYPE.UNI)">Uni</button>

<button onclick="setType(TYPE.POLICE)">Polizei</button>
<button onclick="setType(TYPE.MALL)">Mega Mall</button>
<button onclick="setType(TYPE.STADIUM)">Stadion</button>

<button onclick="setType(TYPE.TRAIN)">Bahnhof</button>
<button onclick="setType(TYPE.AIRPORT)">Flughafen</button>
<button onclick="setType(TYPE.PORT)">Hafen</button>

<button onclick="setType(TYPE.WATER)">Wasserwerk</button>
<button onclick="setType(TYPE.SOLAR)">Solar</button>

<br><br>

<button onclick="saveCity()">Speichern</button>
<button onclick="loadCity()">Laden</button>

</div>

<p id="stats"></p>

<canvas id="game" width="800" height="800"></canvas>

<script>

const canvas=document.getElementById("game");
const ctx=canvas.getContext("2d");

const grid=40;
const size=canvas.width/grid;

const TYPE={
EMPTY:0,
ROAD:1,

RES1:2,
RES2:3,
RES3:4,

COM1:5,
COM2:6,

IND1:7,
IND2:8,

PARK1:9,
PARK2:10,

POWER1:11,
POWER2:12,

FIRE:13,
HOSP:14,
SCHOOL:15,
UNI:16,

POLICE:17,
MALL:18,
STADIUM:19,

TRAIN:20,
AIRPORT:21,
PORT:22,

WATER:23,
SOLAR:24
};

let current=TYPE.ROAD;

let map=[];
let cars=[];
let trains=[];
let planes=[];
let ships=[];

let population=0;
let money=200000;
let pollution=0;

let hoverX=0;
let hoverY=0;
let dragging=false;

for(let y=0;y<grid;y++){

map[y]=[];

for(let x=0;x<grid;x++){

map[y][x]={type:TYPE.EMPTY,fire:false};

}

}

function setType(t){

current=t;

}

function build(x,y){

if(x<0||y<0||x>=grid||y>=grid)return;

map[y][x].type=current;

}

canvas.addEventListener("mousedown",e=>{
dragging=true;
place(e);
});

canvas.addEventListener("mousemove",e=>{

const rect=canvas.getBoundingClientRect();

hoverX=Math.floor((e.clientX-rect.left)/size);
hoverY=Math.floor((e.clientY-rect.top)/size);

if(dragging) place(e);

});

canvas.addEventListener("mouseup",()=>dragging=false);
canvas.addEventListener("mouseleave",()=>dragging=false);

function place(e){

const rect=canvas.getBoundingClientRect();

const x=Math.floor((e.clientX-rect.left)/size);
const y=Math.floor((e.clientY-rect.top)/size);

build(x,y);

}

function simulate(){

population=0;
pollution=0;

for(let y=0;y<grid;y++){
for(let x=0;x<grid;x++){

let t=map[y][x].type;

if(t===TYPE.RES1) population+=5;
if(t===TYPE.RES2) population+=10;
if(t===TYPE.RES3) population+=20;

if(t===TYPE.COM1) money+=1;
if(t===TYPE.COM2) money+=2;

if(t===TYPE.IND1){money+=3;pollution+=2;}
if(t===TYPE.IND2){money+=5;pollution+=4;}

if(t===TYPE.PARK1) pollution-=0.5;
if(t===TYPE.PARK2) pollution-=1;

}

}

}

function spawnTraffic(){

for(let y=0;y<grid;y++){
for(let x=0;x<grid;x++){

let t=map[y][x].type;

if(t===TYPE.ROAD && Math.random()<0.002){
cars.push({x:x+0.5,y:y+0.5,dir:Math.floor(Math.random()*4)});
}

if(t===TYPE.TRAIN && Math.random()<0.0005){
trains.push({x:x,y:y});
}

if(t===TYPE.AIRPORT && Math.random()<0.0003){
planes.push({x:x,y:y});
}

if(t===TYPE.PORT && Math.random()<0.0003){
ships.push({x:x,y:y});
}

}

}

}

function disasters(){

if(Math.random()<0.0004){

let x=Math.floor(Math.random()*grid);
let y=Math.floor(Math.random()*grid);

map[y][x].fire=true;

}

}

function fireControl(){

for(let y=0;y<grid;y++){
for(let x=0;x<grid;x++){

if(map[y][x].type===TYPE.FIRE){

for(let dy=-3;dy<=3;dy++){
for(let dx=-3;dx<=3;dx++){

let nx=x+dx;
let ny=y+dy;

if(nx>=0 && ny>=0 && nx<grid && ny<grid){

map[ny][nx].fire=false;

}

}

}

}

}

}

}

function draw(){

ctx.clearRect(0,0,canvas.width,canvas.height);

for(let y=0;y<grid;y++){
for(let x=0;x<grid;x++){

let t=map[y][x].type;

let color="#222";

if(t===TYPE.ROAD)color="#777";

if(t===TYPE.RES1)color="#2ecc71";
if(t===TYPE.RES2)color="#27ae60";
if(t===TYPE.RES3)color="#16a085";

if(t===TYPE.COM1)color="#3498db";
if(t===TYPE.COM2)color="#2980b9";

if(t===TYPE.IND1)color="#e67e22";
if(t===TYPE.IND2)color="#d35400";

if(t===TYPE.PARK1)color="#2ecc71";
if(t===TYPE.PARK2)color="#27ae60";

if(t===TYPE.POWER1)color="#f1c40f";
if(t===TYPE.POWER2)color="#f39c12";

if(t===TYPE.FIRE)color="#c0392b";
if(t===TYPE.HOSP)color="#9b59b6";
if(t===TYPE.SCHOOL)color="#f39c12";
if(t===TYPE.UNI)color="#8e44ad";

if(t===TYPE.POLICE)color="#2c3e50";
if(t===TYPE.MALL)color="#e74c3c";
if(t===TYPE.STADIUM)color="#d35400";

if(t===TYPE.TRAIN)color="#2980b9";
if(t===TYPE.AIRPORT)color="#34495e";
if(t===TYPE.PORT)color="#16a085";

if(t===TYPE.WATER)color="#1abc9c";
if(t===TYPE.SOLAR)color="#f7dc6f";

ctx.fillStyle=color;
ctx.fillRect(x*size,y*size,size,size);

if(map[y][x].fire){
ctx.fillStyle="red";
ctx.fillRect(x*size,y*size,size,size);
}

}
}

ctx.strokeStyle="rgba(255,255,255,0.1)";

for(let i=0;i<=grid;i++){

ctx.beginPath();
ctx.moveTo(i*size,0);
ctx.lineTo(i*size,canvas.height);
ctx.stroke();

ctx.beginPath();
ctx.moveTo(0,i*size);
ctx.lineTo(canvas.width,i*size);
ctx.stroke();

}

ctx.strokeStyle="yellow";
ctx.strokeRect(hoverX*size,hoverY*size,size,size);

}

function updateUI(){

document.getElementById("stats").innerText=

"Einwohner: "+population+
" | Geld: "+money+
" | Verschmutzung: "+Math.floor(pollution);

}

function saveCity(){
localStorage.setItem("metro25",JSON.stringify(map));
}

function loadCity(){

let data=localStorage.getItem("metro25");

if(data){
map=JSON.parse(data);
}

}

function loop(){

simulate();
spawnTraffic();
disasters();
fireControl();
draw();
updateUI();

requestAnimationFrame(loop);

}

loop();

</script>

</body>
</html>
